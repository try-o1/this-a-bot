<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex布局</title>
    <style>
        * { box-sizing: border-box; }
        /* add border to every div/region */
        div { border: 1px solid #000; }
        body {
            margin: 0;
            height: 100vh;
            background-color: #eee;
            display: flex;
        }
        .baise { background-color: white; }
        .flex    { display: flex; }
        .column  { flex-direction: column; }
        .flex1   { flex: 1; }
        .mg8     { margin: 8px; }
        .mgr8    { margin-right: 8px; }
        .mgt8    { margin-top: 8px; }
    </style>
</head>
<body class="flex">
    <!-- 侧边栏 -->
    <div style="width:200px;" class="baise">侧边栏</div>

    <!-- 主区域 -->
    <div class="flex flex1 column">
        <!-- 头部 -->
        <div style="height:60px;" class="baise">头部栏</div>

        <!-- 内容区域 -->
        <div class="flex flex1">
            <!-- 左区域 -->
            <div style="flex:3;" class="flex column mg8">
                <!-- 数据区域 -->
                <div class="flex"></div>
                <!-- 数据块 -->
                <div style="height:100px;" class="flex1 baise mgr8"></div>
                <div style="height:100px;" class="flex1 baise mgr8"></div>
                <div style="height:100px;" class="flex1 baise mgr8"></div>
                <div style="height:100px;" class="flex1 baise mgr8"></div>

                <!-- 列表区域 -->
                <div class="flex column">
                    <div style="height:160px;" class="flex1 baise mgt8"></div>
                    <div style="height:160px;" class="flex1 baise mgt8"></div>
                    <div style="height:160px;" class="flex1 baise mgt8"></div>
                </div>
            </div>

            <!-- 右区域 -->
            <div style="flex:1;" class="flex column mgr8 mgt8">
                右区域
            </div>
        </div>

        <!-- 提示 / 消息 -->
        <div style="height:150px;" class="baise">提示区域</div>
        <div style="height:300px;" class="baise mgt8">消息区域</div>
    </div>
</body>
</html>
